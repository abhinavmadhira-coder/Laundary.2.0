<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Laundry Hub Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <header class="banner">
    <h1>🧺 Hostel Laundry Hub</h1>
    <p>Login to your portal</p>
  </header>

  <main>
    <section>
      <h2>Student Login</h2>
      <input type="text" id="studentUser" placeholder="Username">
      <input type="password" id="studentPass" placeholder="Password">
      <button onclick="studentLogin()">Login</button>
      <p>New student? <a href="register.html">Sign up here</a></p>
    </section>

    <section>
      <h2>Admin Login</h2>
      <input type="text" id="adminUser" placeholder="Username">
      <input type="password" id="adminPass" placeholder="Password">
      <button onclick="adminLogin()">Login</button>
    </section>
  </main>
</body>
</html>
