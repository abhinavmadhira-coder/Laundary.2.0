<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Portal</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <header class="banner">
    <h1>👕 Student Laundry Portal</h1>
  </header>

  <main>
    <section id="schedule">
      <h2>Your Laundry Day</h2>
      <div id="studentSchedule"></div>
    </section>

    <section id="tracking">
      <h2>Your Laundry Status</h2>
      <div id="studentStatus"></div>
    </section>

    <section>
      <h2>Change Password</h2>
      <input type="password" id="newPass" placeholder="New Password">
      <button onclick="changePassword()">Update Password</button>
    </section>
  </main>
</body>
</html>
